<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>富士山の惨劇 ～幼馴染たちの最後の登山～</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#1a0a2e;--accent:#e94560;--gold:#f5c518;--text:#e0e0e0;--text-dim:#888;--danger:#ff1744;--success:#00e676;--glass:rgba(255,255,255,0.05);--glass-border:rgba(255,255,255,0.1);--shadow:0 8px 32px rgba(0,0,0,0.6)}
html{font-size:16px}
body{font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;background:var(--primary);color:var(--text);min-height:100vh;overflow-x:hidden;padding:0}
@media(max-width:768px){body{padding:32px 0}.game-container{margin:0 8px;border-radius:12px}}
@media(min-width:769px){body{display:flex;justify-content:center;align-items:flex-start;padding:24px}}
.game-container{width:100%;max-width:800px;min-height:calc(100vh - 64px);margin:0 auto;position:relative;background:linear-gradient(180deg,#0d0d1a 0%,#1a0a2e 50%,#0d0d1a 100%);border:1px solid var(--glass-border);border-radius:16px;overflow:hidden;box-shadow:var(--shadow),0 0 60px rgba(233,69,96,0.1)}
.screen{display:none;width:100%;min-height:calc(100vh - 64px);flex-direction:column;position:relative}
.screen.active{display:flex}
#particles-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:.4}
#title-screen{align-items:center;justify-content:center;text-align:center;padding:40px 20px;position:relative;z-index:1}
.title-mountain{width:100%;height:200px;position:relative;margin-bottom:20px}
.mountain-svg{width:100%;height:100%}
.title-logo{margin-bottom:10px;animation:titlePulse 3s ease-in-out infinite}
.title-logo h1{font-size:2.4rem;background:linear-gradient(135deg,#ff6b6b,#ee5a24,#f5c518,#ff6b6b);background-size:300% 300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 20px rgba(245,197,24,.3));animation:gradientShift 4s ease infinite;letter-spacing:4px}
.title-logo .subtitle{font-size:1rem;color:var(--text-dim);margin-top:8px;letter-spacing:6px}
@keyframes titlePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.02)}}
@keyframes gradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.blood-drip{position:absolute;width:3px;background:linear-gradient(180deg,var(--accent),transparent);animation:drip 3s ease-in infinite;border-radius:0 0 50% 50%}
@keyframes drip{0%{height:0;opacity:1}70%{height:60px;opacity:1}100%{height:80px;opacity:0}}
.menu-buttons{display:flex;flex-direction:column;gap:16px;margin-top:30px;width:280px}
.btn{padding:16px 32px;border:none;border-radius:8px;font-size:1.1rem;font-family:inherit;cursor:pointer;transition:all .3s ease;position:relative;overflow:hidden;letter-spacing:2px}
.btn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);transition:left .5s}
.btn:hover::before{left:100%}
.btn-primary{background:linear-gradient(135deg,var(--accent),#c0392b);color:#fff;box-shadow:0 4px 20px rgba(233,69,96,.4);font-weight:700}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 30px rgba(233,69,96,.6)}
.btn-secondary{background:var(--glass);color:var(--text);border:1px solid var(--glass-border);backdrop-filter:blur(10px)}
.btn-secondary:hover{background:rgba(255,255,255,.1);transform:translateY(-2px)}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
#chapter-select-screen{align-items:center;justify-content:flex-start;text-align:center;padding:40px 20px;position:relative;z-index:1}
.chapter-select-header{margin-bottom:32px}
.chapter-select-header h2{font-size:1.6rem;color:var(--gold);letter-spacing:3px;margin-bottom:8px}
.chapter-select-header p{font-size:.85rem;color:var(--text-dim)}
.chapter-list{display:flex;flex-direction:column;gap:10px;width:100%;max-width:450px}
.chapter-item{display:flex;align-items:center;gap:12px;padding:16px 20px;background:var(--glass);border:1px solid var(--glass-border);border-radius:10px;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
.chapter-item:hover:not(.locked):not(.cleared){background:rgba(233,69,96,.15);border-color:var(--accent);transform:translateX(4px)}
.chapter-item.locked{opacity:.3;cursor:not-allowed;display:none}
.chapter-item.cleared{opacity:.6;cursor:not-allowed;border-color:var(--success)}
.chapter-item.cleared::after{content:'✓ CLEAR';position:absolute;right:16px;color:var(--success);font-size:.8rem;font-weight:700}
.chapter-item.current{border-color:var(--gold);box-shadow:0 0 15px rgba(245,197,24,.2)}
.chapter-icon{font-size:1.4rem;width:36px;text-align:center}
.chapter-info h3{font-size:.95rem;color:var(--text);text-align:left}
.chapter-info p{font-size:.75rem;color:var(--text-dim);margin-top:2px;text-align:left}
.back-to-title-btn{margin-top:28px;width:100%;max-width:450px}
#options-screen{align-items:center;justify-content:center;padding:40px 20px;z-index:1}
.options-panel{background:var(--glass);border:1px solid var(--glass-border);border-radius:16px;padding:32px;width:100%;max-width:400px;backdrop-filter:blur(10px)}
.options-panel h2{text-align:center;margin-bottom:24px;color:var(--gold);font-size:1.4rem}
.option-group{margin-bottom:20px}
.option-group label{display:block;font-size:.9rem;color:var(--text-dim);margin-bottom:8px}
.option-group input[type=range]{width:100%;accent-color:var(--accent)}
.btn-danger{background:linear-gradient(135deg,#d32f2f,#b71c1c);color:#fff;width:100%;margin-top:16px}
.btn-back{background:var(--glass);border:1px solid var(--glass-border);color:var(--text);width:100%;margin-top:10px}
#game-screen{flex-direction:column;z-index:1}
.game-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:rgba(0,0,0,.5);border-bottom:1px solid var(--glass-border);flex-shrink:0}
.game-header .chapter-label{font-size:.85rem;color:var(--gold);letter-spacing:1px}
.header-btns{display:flex;gap:8px}
.btn-icon{width:36px;height:36px;border-radius:50%;border:1px solid var(--glass-border);background:var(--glass);color:var(--text);font-size:1rem;cursor:pointer;transition:all .3s;display:flex;align-items:center;justify-content:center}
.btn-icon:hover{background:rgba(255,255,255,.15);border-color:var(--accent)}
.scene-bg{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0;overflow:hidden}
.scene-bg .bg-gradient{width:100%;height:100%;position:absolute}
.character-area{position:relative;height:380px;display:flex;justify-content:center;align-items:flex-end;padding:0 20px 10px;z-index:2;flex-shrink:0}
.character-sprite{width:300px;height:360px;object-fit:contain;object-position:bottom;filter:drop-shadow(0 6px 20px rgba(0,0,0,.8));transition:all .5s ease;animation:charAppear .5s ease-out}
@keyframes charAppear{from{opacity:0;transform:translateY(30px) scale(.85)}to{opacity:1;transform:translateY(0) scale(1)}}
@media(max-width:768px){.character-area{height:300px}.character-sprite{width:240px;height:280px}}
@media(min-width:1024px){.character-area{height:420px}.character-sprite{width:350px;height:400px}}
.dialogue-area{position:relative;z-index:3;padding:0 16px 16px;flex:1;display:flex;flex-direction:column;justify-content:flex-end;min-height:250px}
.dialogue-box{background:linear-gradient(180deg,rgba(10,10,30,.92),rgba(5,5,20,.97));border:1px solid var(--glass-border);border-radius:12px;padding:20px;min-height:150px;position:relative;backdrop-filter:blur(15px);box-shadow:0 -4px 30px rgba(0,0,0,.5)}
.speaker-name{font-size:.85rem;font-weight:700;color:var(--gold);margin-bottom:8px;padding:2px 12px;background:rgba(245,197,24,.1);border-radius:4px;display:inline-block}
.speaker-name.narrator{color:var(--text-dim);background:rgba(255,255,255,.05)}
.dialogue-text{font-size:1rem;line-height:1.8;color:var(--text);min-height:60px}
.dialogue-text .typing-cursor{display:inline-block;width:2px;height:1.1em;background:var(--accent);margin-left:2px;animation:cursorBlink .8s step-end infinite;vertical-align:text-bottom}
@keyframes cursorBlink{0%,100%{opacity:1}50%{opacity:0}}
.click-indicator{position:absolute;bottom:12px;right:16px;font-size:.75rem;color:var(--text-dim);animation:clickPulse 1.5s ease-in-out infinite}
@keyframes clickPulse{0%,100%{opacity:.4}50%{opacity:1}}
.choices-area{display:none;flex-direction:column;gap:8px;padding:8px 0;margin-top:12px}
.choices-area.active{display:flex}
.choice-btn{padding:14px 20px;background:linear-gradient(135deg,rgba(15,52,96,.6),rgba(26,10,46,.6));border:1px solid rgba(233,69,96,.3);border-radius:8px;color:var(--text);font-size:.95rem;font-family:inherit;cursor:pointer;transition:all .3s;text-align:left;position:relative;overflow:hidden}
.choice-btn::before{content:'';position:absolute;left:0;top:0;width:3px;height:100%;background:var(--accent);opacity:0;transition:opacity .3s}
.choice-btn:hover{background:linear-gradient(135deg,rgba(233,69,96,.2),rgba(15,52,96,.4));border-color:var(--accent);transform:translateX(6px)}
.choice-btn:hover::before{opacity:1}
.choice-btn:active{transform:translateX(6px) scale(.98)}
.choice-btn.selected-party{border-color:var(--success);background:linear-gradient(135deg,rgba(0,230,118,.15),rgba(15,52,96,.4))}
.item-notification{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.8);background:linear-gradient(135deg,rgba(10,10,30,.97),rgba(26,10,46,.97));border:2px solid var(--gold);border-radius:16px;padding:32px 40px;text-align:center;z-index:1000;opacity:0;pointer-events:none;transition:all .5s ease;box-shadow:0 0 40px rgba(245,197,24,.3)}
.item-notification.show{opacity:1;transform:translate(-50%,-50%) scale(1);pointer-events:auto}
.item-notification .item-icon{font-size:3rem;margin-bottom:12px;animation:itemBounce .6s ease}
@keyframes itemBounce{0%{transform:scale(0) rotate(-180deg)}60%{transform:scale(1.2) rotate(10deg)}100%{transform:scale(1) rotate(0)}}
.item-notification h3{color:var(--gold);margin-bottom:4px}
.item-notification p{color:var(--text-dim);font-size:.85rem}
.pokemon-encounter{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);z-index:900;display:none;align-items:center;justify-content:center;flex-direction:column}
.pokemon-encounter.active{display:flex}
.pokemon-wild{text-align:center;animation:pokemonAppear .8s ease}
@keyframes pokemonAppear{0%{transform:scale(0) rotate(-10deg);opacity:0}60%{transform:scale(1.1) rotate(2deg)}100%{transform:scale(1) rotate(0);opacity:1}}
.pokemon-wild img{width:280px;height:280px;image-rendering:pixelated;filter:drop-shadow(0 0 30px rgba(255,255,255,.4))}
@media(max-width:768px){.pokemon-wild img{width:220px;height:220px}}
.pokemon-wild h3{font-size:1.3rem;color:var(--gold);margin-top:8px}
.pokemon-encounter .encounter-buttons{display:flex;gap:12px;margin-top:16px}
.pokemon-battle{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(180deg,#87CEEB 0%,#228B22 60%,#1a5c1a 100%);z-index:950;display:none;flex-direction:column;padding:16px}
.pokemon-battle.active{display:flex}
.battle-field{flex:1;display:flex;flex-direction:column;justify-content:space-between;padding:20px 10px}
.battle-pokemon{display:flex;align-items:center;gap:16px;padding:12px;background:rgba(0,0,0,.3);border-radius:12px;backdrop-filter:blur(5px)}
.battle-pokemon.enemy{flex-direction:row-reverse;align-self:flex-end}
.battle-pokemon.player{align-self:flex-start}
.battle-pokemon img{width:150px;height:150px;image-rendering:pixelated}
@media(max-width:768px){.battle-pokemon img{width:120px;height:120px}}
.battle-info{flex:1}
.battle-info .poke-name{font-weight:700;font-size:1rem;margin-bottom:4px}
.hp-bar-container{width:100%;height:10px;background:#333;border-radius:5px;overflow:hidden;margin-top:4px}
.hp-bar{height:100%;background:linear-gradient(90deg,#00e676,#76ff03);transition:width .5s ease;border-radius:5px}
.hp-bar.low{background:linear-gradient(90deg,#ff1744,#ff5252)}
.hp-bar.mid{background:linear-gradient(90deg,#ff9100,#ffc107)}
.hp-text{font-size:.75rem;color:var(--text);margin-top:2px}
.battle-commands{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px;background:rgba(0,0,0,.6);border-radius:12px}
.battle-btn{padding:14px;border:2px solid var(--glass-border);border-radius:8px;background:rgba(0,0,0,.4);color:#fff;font-size:1rem;font-family:inherit;cursor:pointer;transition:all .2s;font-weight:700}
.battle-btn:hover{background:rgba(255,255,255,.1);border-color:var(--gold)}
.battle-btn:active{transform:scale(.95)}
.battle-log{padding:12px 16px;background:rgba(0,0,0,.7);border-radius:8px;margin:8px 0;min-height:50px;display:flex;align-items:center}
.battle-log p{color:#fff;font-size:.95rem}
.moves-panel{display:none;grid-template-columns:1fr 1fr;gap:8px;padding:12px;background:rgba(0,0,0,.6);border-radius:12px}
.moves-panel.active{display:grid}
.move-btn{padding:12px 8px;border:2px solid;border-radius:8px;background:rgba(0,0,0,.3);color:#fff;font-size:.85rem;font-family:inherit;cursor:pointer;transition:all .2s;text-align:center}
.move-btn:hover{transform:scale(1.03);filter:brightness(1.2)}
.move-btn .move-pp{font-size:.7rem;opacity:.7;margin-top:2px}
#gameover-screen{align-items:center;justify-content:center;text-align:center;padding:40px 20px;z-index:1}
.gameover-content h1{font-size:3rem;color:var(--danger);text-shadow:0 0 30px rgba(255,23,68,.5);margin-bottom:16px;animation:gameoverShake .5s ease}
@keyframes gameoverShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px)}40%{transform:translateX(10px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
.gameover-content p{color:var(--text-dim);margin-bottom:24px;font-size:1.1rem}
.death-description{color:var(--accent);font-size:.95rem;margin-bottom:20px;padding:16px;border:1px solid rgba(233,69,96,.3);border-radius:8px;background:rgba(233,69,96,.05);white-space:pre-line}
.flash-effect{position:fixed;top:0;left:0;width:100%;height:100%;opacity:0;pointer-events:none;z-index:800}
.screen-shake{animation:shake .4s ease}
@keyframes shake{0%,100%{transform:translate(0)}10%{transform:translate(-8px,3px)}20%{transform:translate(8px,-3px)}30%{transform:translate(-6px,2px)}40%{transform:translate(6px,-2px)}50%{transform:translate(-4px)}60%{transform:translate(4px)}}
.rain-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:700;overflow:hidden;display:none}
.rain-container.active{display:block}
.raindrop{position:absolute;width:2px;background:linear-gradient(180deg,transparent,rgba(174,194,224,.5));animation:rainfall linear infinite}
@keyframes rainfall{0%{transform:translateY(-100vh)}100%{transform:translateY(100vh)}}
.fog-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:700;display:none}
.fog-container.active{display:block}
.fog-layer{position:absolute;width:200%;height:100%;background:repeating-linear-gradient(90deg,transparent 0%,rgba(255,255,255,.03) 20%,rgba(255,255,255,.06) 40%,rgba(255,255,255,.03) 60%,transparent 80%);animation:fogMove 20s linear infinite}
@keyframes fogMove{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.blood-splatter{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:810;opacity:0}
.inventory-panel{position:fixed;top:0;right:-320px;width:300px;height:100%;background:linear-gradient(180deg,rgba(10,10,30,.97),rgba(26,10,46,.97));border-left:1px solid var(--glass-border);z-index:500;transition:right .4s ease;padding:20px;overflow-y:auto;backdrop-filter:blur(20px)}
.inventory-panel.open{right:0}
.inventory-panel h3{color:var(--gold);font-size:1.1rem;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--glass-border)}
.inv-section{margin-bottom:20px}
.inv-section h4{color:var(--accent);font-size:.85rem;margin-bottom:8px}
.inv-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--glass);border-radius:6px;margin-bottom:6px;font-size:.85rem}
.inv-item .item-emoji{font-size:1.2rem}
.inv-pokemon{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--glass);border-radius:6px;margin-bottom:6px}
.inv-pokemon img{width:56px;height:56px;image-rendering:pixelated}
.inv-pokemon .poke-info{font-size:.85rem}
.inv-close{position:absolute;top:12px;right:12px;background:0 0;border:none;color:var(--text);font-size:1.5rem;cursor:pointer}
.status-panel{position:fixed;top:0;left:-360px;width:340px;height:100%;background:linear-gradient(180deg,rgba(10,10,30,.97),rgba(26,10,46,.97));border-right:1px solid var(--glass-border);z-index:500;transition:left .4s ease;padding:20px;overflow-y:auto;backdrop-filter:blur(20px)}
.status-panel.open{left:0}
.status-panel h3{color:var(--gold);font-size:1.1rem;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--glass-border)}
.char-status{display:flex;align-items:center;gap:10px;padding:10px;background:var(--glass);border-radius:8px;margin-bottom:8px}
.char-status img{width:56px;height:56px;border-radius:50%;object-fit:cover;border:2px solid var(--glass-border)}
.char-status.dead img{filter:grayscale(100%);border-color:var(--danger)}
.char-status .char-name{font-size:.9rem;font-weight:700}
.char-status .char-state{font-size:.75rem;color:var(--success)}
.char-status.dead .char-state{color:var(--danger)}
.status-close{position:absolute;top:12px;right:12px;background:0 0;border:none;color:var(--text);font-size:1.5rem;cursor:pointer}
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:2000;display:none;align-items:center;justify-content:center}
.modal-overlay.active{display:flex}
.modal-box{background:linear-gradient(135deg,#1a0a2e,#16213e);border:1px solid var(--accent);border-radius:12px;padding:28px;max-width:360px;width:90%;text-align:center}
.modal-box h3{color:var(--accent);margin-bottom:12px}
.modal-box p{color:var(--text-dim);font-size:.9rem;margin-bottom:20px}
.modal-buttons{display:flex;gap:10px;justify-content:center}
.fade-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:750;opacity:0;pointer-events:none;transition:opacity .8s ease}
.fade-overlay.active{opacity:1;pointer-events:auto}
.autosave-indicator{position:fixed;top:16px;right:16px;padding:6px 14px;background:rgba(0,0,0,.7);border:1px solid var(--glass-border);border-radius:20px;font-size:.75rem;color:var(--text-dim);z-index:600;opacity:0;transition:opacity .3s}
.autosave-indicator.show{opacity:1}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:0 0}::-webkit-scrollbar-thumb{background:var(--glass-border);border-radius:3px}
.choices-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:850;display:none;align-items:center;justify-content:center;padding:20px}
.choices-overlay.active{display:flex}
.choices-overlay-inner{width:100%;max-width:500px;max-height:80vh;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding:20px;background:linear-gradient(180deg,rgba(10,10,30,.97),rgba(5,5,20,.97));border:1px solid var(--glass-border);border-radius:16px;box-shadow:0 0 40px rgba(0,0,0,.8);backdrop-filter:blur(15px)}
.choices-overlay-inner .choice-header{color:var(--gold);font-size:.85rem;text-align:center;margin-bottom:4px;letter-spacing:1px}
.pokemon-swap-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:960;display:none;align-items:center;justify-content:center;padding:20px;flex-direction:column}
.pokemon-swap-overlay.active{display:flex}
.pokemon-swap-box{width:100%;max-width:500px;max-height:85vh;overflow-y:auto;background:linear-gradient(180deg,rgba(10,10,30,.97),rgba(26,10,46,.97));border:2px solid var(--gold);border-radius:16px;padding:20px}
.pokemon-swap-box h3{color:var(--gold);text-align:center;margin-bottom:16px;font-size:1.1rem}
.pokemon-swap-item{display:flex;align-items:center;gap:12px;padding:12px;background:var(--glass);border:1px solid var(--glass-border);border-radius:8px;margin-bottom:8px;cursor:pointer;transition:all .3s}
.pokemon-swap-item:hover{background:rgba(233,69,96,.15);border-color:var(--accent)}
.pokemon-swap-item img{width:48px;height:48px;image-rendering:pixelated}
.pokemon-swap-item .swap-info{flex:1;font-size:.9rem}
.pokemon-swap-item .swap-name{font-weight:700}
.pokemon-swap-item .swap-detail{font-size:.75rem;color:var(--text-dim)}
.pokemon-swap-new{text-align:center;margin-bottom:16px;padding:12px;border:1px dashed var(--success);border-radius:8px}
.pokemon-swap-new img{width:80px;height:80px;image-rendering:pixelated}
.pokemon-swap-new .swap-new-name{color:var(--success);font-weight:700;margin-top:4px}
</style>
</head>

const TextEngine={_typing:!1,_fullText:'',_timeout:null,_resolve:null,_skipped:!1,async typeText(t){return new Promise(r=>{this._typing=!0;this._fullText=t;this._skipped=!1;this._resolve=r;const e=document.getElementById('dialogue-text'),ind=document.getElementById('click-indicator');ind.style.display='none';e.innerHTML='<span class="typing-cursor"></span>';let i=0;const d=Settings.getTypingDelay();const n=()=>{if(this._skipped){e.textContent=t;this._typing=!1;ind.style.display='block';r();return}if(i<t.length){e.textContent=t.substring(0,i+1);e.innerHTML+='<span class="typing-cursor"></span>';i++;this._timeout=setTimeout(n,d)}else{e.textContent=t;this._typing=!1;ind.style.display='block';r()}};n()})},skip(){if(this._typing){this._skipped=!0;clearTimeout(this._timeout);document.getElementById('dialogue-text').textContent=this._fullText;document.getElementById('click-indicator').style.display='block';this._typing=!1;if(this._resolve)this._resolve()}},isTyping(){return this._typing}};

);p.appendChild(bb);p.classList.add('active')},showBag(){this.log('使えるアイテムがない！');setTimeout(()=>this.log('どうする？'),1500)},showPokemonSwitch(){const av=this.party.filter(p=>p.hp>0&&p!==this.playerPokemon);if(av.length===0){this.log('他に出せるポケモンがいない！');setTimeout(()=>this.log('どうする？'),1500);return}const p=document.getElementById('moves-panel');document.getElementById('battle-commands').style.display='none';p.innerHTML='';av.forEach(pk=>{const b=document.createElement('button');b.className='move-btn';b.style.borderColor='#fff';b.innerHTML=`<div>${pk.name}</div><div class="move-pp">HP:${pk.hp}/${pk.maxHp}</div>`;b.onclick=()=>{this.playerPokemon=pk;this.log(`ゆけっ！ ${pk.name}！`);this.updateUI();setTimeout(()=>this.enemyTurn(),1500)};p.appendChild(b)});const bb=document.createElement('button');bb.className='move-btn';bb.style.borderColor='#888';bb.textContent='← もどる';bb.onclick=()=>this.showCommands();p.appendChild(bb);p.classList.add('active')},tryRun(){if(Math.random()>.4){this.log('うまく 逃げ切れた！');setTimeout(()=>this.endBattle(!1),1500)}else{this.log('逃げられない！');setTimeout(()=>this.enemyTurn(),1500)}},async executeMove(mi){if(!this.battleActive)return;const m=this.playerPokemon.moves[mi];if(m.pp<=0)return;m.pp--;document.getElementById('moves-panel').classList.remove('active');if(Math.random()*100>(m.accuracy||100))this.log(`${this.playerPokemon.name}の ${m.name}！ しかし 外れた！`);else{const ef=this.getTypeEff(m.type,this.enemyPokemon.types||[]);const dm=this.calcDmg(this.playerPokemon,this.enemyPokemon,m,ef);this.enemyPokemon.hp-=dm;let mg=`${this.playerPokemon.name}の ${m.name}！ ${dm}のダメージ！`;if(ef>=2)mg+=' 効果は バツグンだ！';else if(ef>0&&ef<1)mg+=' 効果は いまひとつ…';else if(ef===0)mg=`${this.playerPokemon.name}の ${m.name}！ 効果が ないようだ…`;this.log(mg);if(ef>0){Effects.playSound('battle');Effects.shake()}}this.updateUI();Save.save();if(this.enemyPokemon.hp<=0){this.enemyPokemon.hp=0;this.updateUI();setTimeout(()=>{this.log(`${this.trainerName}の ${this.enemyPokemon.name}は 倒れた！`);setTimeout(()=>{this. function registerChapter(id,s){Data.chapterScripts[id]=s;if(id!=='prologue'&&!Data.chapterOrder.includes(id)){Data.chapterOrder.push(id);Data.chapterOrder.sort((a,b)=>{if(a==='prologue')return-1;if(b==='prologue')return 1;return(parseInt(a.replace('chapter',''))||0)-(parseInt(b.replace('chapter',''))||0)})}}
function initParticles(){const cv=document.getElementById('particles-canvas'),ctx=cv.getContext('2d');let pts=[],w,h;function rs(){w=cv.width=window.innerWidth;h=cv.height=window.innerHeight}rs();window.addEventListener('resize',rs);for(let i=0;i<60;i++)pts.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*2+.5,dx:(Math.random()-.5)*.5,dy:(Math.random()-.5)*.5,o:Math.random()*.5+.1});(function draw(){ctx.clearRect(0,0,w,h);pts.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(233,69,96,${p.o})`;ctx.fill();p.x+=p.dx;p.y+=p.dy;if(p.x<0||p.x>w)p.dx*=-1;if(p.y<0||p.y>h)p.dy*=-1});requestAnimationFrame(draw)})()}
